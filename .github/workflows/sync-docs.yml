name: Sync and Deploy Documentation

# Automated documentation sync from Corvus with GitOps deployment.
# 
# Triggers:
# - Scheduled: Every 6 hours (heartbeat sync)
# - Repository Dispatch: Event-driven (immediate sync on change.completed, incident.resolved)
# - Manual: workflow_dispatch for on-demand sync

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours at minute 0
  repository_dispatch:
    types: [sync-docs]
  workflow_dispatch: # Allow manual trigger via GitHub UI

jobs:
  sync-and-deploy:
    name: Sync and Deploy Documentation
    runs-on: [self-hosted, dockp04]
    
    steps:
      - name: Checkout living-docs
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need history to detect changes
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Corvus sync
        env:
          CORVUS_URL: http://localhost:9420
          CORVUS_API_KEY: ${{ secrets.CORVUS_API_KEY }}
        run: python scripts/fetch_and_sync.py
        
      - name: Detect source changes
        id: source_changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "has_source_changes=false" >> $GITHUB_OUTPUT
            echo "No documentation source changes"
          else
            echo "has_source_changes=true" >> $GITHUB_OUTPUT
            echo "Documentation source changes detected"
          fi
      
      - name: Commit source changes
        if: steps.source_changes.outputs.has_source_changes == 'true'
        run: |
          git commit -m "docs: automated sync from Corvus [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Build MkDocs site
        if: always()
        run: |
          mkdocs build --site-dir _site
          echo "Built site with $(find _site -type f | wc -l) files"
      
      - name: Checkout homelab-gitops
        uses: actions/checkout@v4
        with:
          repository: tmttodd/homelab-gitops
          path: homelab-gitops
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1
      
      - name: Deploy site to homelab-gitops
        id: deploy
        run: |
          # Sync built site to homelab-gitops
          rsync -av --delete _site/ homelab-gitops/stacks/core/docs/site/
          
          # Check if there are changes
          cd homelab-gitops
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add stacks/core/docs/site/
          
          if git diff --staged --quiet; then
            echo "No site changes to commit"
            echo "has_site_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Site changes detected, committing..."
            git commit -m "deploy: update living-docs site [skip ci]"
            git push origin main
            echo "has_site_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Site deployed to homelab-gitops"
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      
      - name: Summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Source changes: ${{ steps.source_changes.outputs.has_source_changes }}"
          echo "Site changes: ${{ steps.deploy.outputs.has_site_changes }}"
          echo ""
          echo "Next: dockp04 will auto-sync via git pull (watchtower or cron)"
          echo "URL: https://docs.themillertribe-int.org"
