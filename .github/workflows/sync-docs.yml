name: Sync Documentation

# Automated documentation sync from Corvus operational governance platform.
# 
# Triggers:
# - Scheduled: Every 6 hours (heartbeat sync)
# - Repository Dispatch: Event-driven (immediate sync on change.completed, incident.resolved)
# - Manual: workflow_dispatch for on-demand sync

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours at minute 0
  repository_dispatch:
    types: [sync-docs]
  workflow_dispatch: # Allow manual trigger via GitHub UI

permissions:
  contents: read

jobs:
  sync:
    name: Sync Documentation from Corvus
    runs-on: [self-hosted, dockp04]
    
    steps:
      - name: Checkout living-docs
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need history to detect changes
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Corvus sync
        env:
          CORVUS_URL: http://localhost:9420
          CORVUS_API_KEY: ${{ secrets.CORVUS_API_KEY }}
        run: python scripts/fetch_and_sync.py
        
      - name: Detect changes
        id: changes
        run: |
          git config user.name "Claude Sync Bot"
          git config user.email "claude-sync-bot@tmt-homelab.local"
          git add .
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No documentation changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Documentation changes detected"
          fi
      
      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "docs: automated sync from Corvus [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build MkDocs site
        if: always()
        run: |
          mkdocs build --strict --site-dir _site
        
      - name: Deploy to dockp04
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: dockp04
          username: ${{ secrets.DOCKP04_USER }}
          key: ${{ secrets.DOCKP04_SSH_KEY }}
          script: |
            # Create site directory if it doesn't exist
            mkdir -p /mnt/docker/stacks/docs/site
            
            # Sync built site (using rsync for efficiency)
            # Note: GitHub Actions workspace is at $HOME/work/living-docs/living-docs
            rsync -av --delete $HOME/work/living-docs/living-docs/_site/ /mnt/docker/stacks/docs/site/
            
            # Restart container to pick up new content
            cd /mnt/docker/stacks/docs
            docker compose restart docs
            
            # Clean up old site files (optional, keep last 5 versions)
            # find /mnt/docker/stacks/docs/site -type f -mtime +30 -delete
        
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: dockp04
          username: ${{ secrets.DOCKP04_USER }}
          key: ${{ secrets.DOCKP04_SSH_KEY }}
          script: |
            # Wait for container to be healthy
            sleep 5
            
            # Check if site files exist
            if [ -f /mnt/docker/stacks/docs/site/index.html ]; then
              echo "✅ Site files deployed successfully"
              echo "File count: $(find /mnt/docker/stacks/docs/site -type f | wc -l)"
              echo "Latest index.html: $(stat -c %y /mnt/docker/stacks/docs/site/index.html 2>/dev/null || stat -f %Sm /mnt/docker/stacks/docs/site/index.html)"
            else
              echo "❌ Site files not found"
              exit 1
            fi
            
            # Check container health
            cd /mnt/docker/stacks/docs
            docker compose ps docs
            
            # Test local connectivity (Caddy proxy test)
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ | grep -q "200"; then
              echo "✅ Docs container responding on localhost:8000"
            else
              echo "⚠️  Container may not be responding yet (check logs)"
            fi
